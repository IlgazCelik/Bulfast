<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Bulfast</title>
	<style>
		body {
			font-family: "Open Sans", Roboto, "Segoe UI", system-ui, sans-serif;
			background-color: #000;
			color: #fff;
			padding: 40px;
			text-align: center;
		}
		.container {
			max-width: 800px;
			margin: 0 auto;
		}
		h1 {
			color: #ff0000;
			margin-bottom: 20px;
		}
		.search-box {
			display: flex;
			gap: 10px;
			background: #111;
			padding: 10px;
			border: 1px solid #ff0000;
			margin-bottom: 30px;
		}
		input[type="file"] {
			display: none;
		}
		.upload-btn {
			background: #222;
			color: #fff;
			padding: 10px 20px;
			border: 1px solid #fff;
			cursor: pointer;
		}
		.search-btn {
			background: #ff0000;
			color: #fff;
			border: none;
			padding: 10px 25px;
			cursor: pointer;
			font-weight: bold;
		}
		.results-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
			gap: 15px;
			margin-top: 20px;
		}
	</style>
</head>
<body>

	<div class="container">
		<h1>Bulfast</h1>
		
		<div class="search-box">

			<label for="image-add" class="upload-btn">
				Add Image to Database
			</label>
			<input type="file" id="image-add" accept="image/*">
		
			<label for="image-upload" class="upload-btn">
				Upload Image
			</label>
			<input type="file" id="image-upload" accept="image/*">
			
			<button class="search-btn">Search</button>
		</div>

		<h3>Nearest Matches</h3>
		<div class="results-grid">
		</div>
	</div>

</body>
</html>
